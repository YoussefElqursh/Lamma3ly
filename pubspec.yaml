name: lamma3ly
description: "Lamma3ly - Multi-domain service platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Networking
  dio: ^5.8.0+1

  # Navigation
  go_router: ^15.1.2

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Dependency Injection
  get_it: ^8.0.3

  # Localization
  intl: ^0.20.2

  # Logging
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
